---
- name: Allow access to SSH
  community.general.ufw:
    rule: allow
    port: ssh

- name: Allow access to HTTPS
  community.general.ufw:
    rule: allow
    port: https

- name: Allow access to port 4430
  community.general.ufw:
    rule: allow
    port: 4430

- name: Allow access to HTTP
  community.general.ufw:
    rule: allow
    port: http

- name: Allow access to port 8000
  community.general.ufw:
    rule: allow
    port: 8000

- name: Allow all traffic on private network
  community.general.ufw:
    rule: allow
    src: "{{ private_vpc_ip_range }}"

