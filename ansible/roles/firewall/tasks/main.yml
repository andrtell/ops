- name: Insert port-forwading rule in /etc/ufw/before.rules
  ansible.builtin.blockinfile:
    path: /etc/ufw/before.rules
    insertbefore: BOF
    block: |
      *nat
      :PREROUTING ACCEPT [0:0]
      -A PREROUTING -p tcp --dport 80 -j REDIRECT --to-port 8000
      -A PREROUTING -p tcp --dport 443 -j REDIRECT --to-port 4430
      COMMIT

- name: Enable UFW
  community.general.ufw:
    state: enabled
