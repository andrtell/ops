--- 
- name: Allow access on port 22
  community.general.ufw:
    rule: allow
    port: '22'

- name: Allow access on port 443
  community.general.ufw:
    rule: allow
    port: '443'

- name: Allow access on port 80
  community.general.ufw:
    rule: allow
    port: '80'

- name: Allow access on private network
  community.general.ufw:
    rule: allow
    src: 10.110.16.0/20

- name: enable UFW
  community.general.ufw:
    state: enabled
